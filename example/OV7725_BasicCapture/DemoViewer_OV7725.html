<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>⚡ OV7670 PDS Unified Stream Viewer</title>
    <style>
        body { font-family: sans-serif; background: #222; color: #fff; padding: 20px; }
        #canvas-container { margin-top: 10px; background: #000; display: inline-block; padding: 10px; border-radius: 4px; }
        canvas { display: block; image-rendering: pixelated; }
        .controls { margin-bottom: 15px; background: #333; padding: 15px; border-radius: 4px; }
        .main-btn { padding: 10px 20px; font-size: 16px; cursor: pointer; margin-right: 15px; font-weight: bold; }
        .control-panel { margin-top: 15px; padding: 15px; background: #444; border-radius: 4px; }
        .control-row { display: flex; align-items: center; margin-bottom: 12px; }
        .control-row:last-child { margin-bottom: 0; }
        .control-row label { font-weight: bold; margin-right: 15px; width: 140px; }
        .val-display { font-weight: bold; width: 80px; display: inline-block; font-size: 18px; font-family: monospace; }
        .adj-btn { padding: 6px 12px; font-size: 14px; cursor: pointer; margin-right: 5px; font-weight: bold; background: #666; color: #fff; border: 1px solid #888; border-radius: 3px; }
        .adj-btn:hover { background: #777; }
        .radio-group { display: flex; gap: 15px; align-items: center; font-size: 16px; }
        .radio-group input { transform: scale(1.2); cursor: pointer; }
        .preset-group { margin-top: 15px; padding-top: 15px; border-top: 1px solid #555; }
        .preset-btn { padding: 8px 16px; font-size: 14px; cursor: pointer; margin-right: 10px; background: #0055ff; color: #fff; border: none; border-radius: 4px; font-weight: bold; }
        .preset-btn:hover { background: #2277ff; }
        .status-panel { background: #111; padding: 15px; border-radius: 4px; margin-top: 10px; font-family: monospace; line-height: 1.6; }
        .counter { color: #00ffcc; font-weight: bold; font-size: 16px; }
        .highlight { color: #ffcc00; font-weight: bold; font-size: 16px; }
        .auto-status { color: #ff3366; font-weight: bold; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
    </style>
</head>
<body>

    <h2>⚡ OV7670 PDS Unified Stream Viewer</h2>
    
    <div class="controls">
        <button id="connect-btn" class="main-btn">Connect to Camera</button>
        
        <div class="control-panel">
            <strong>🎨 Mode & Size Adjustment:</strong>
            
            <div class="control-row" style="margin-top: 15px;">
                <label>Image Mode:</label>
                <div class="radio-group">
                    <label><input type="radio" name="color-mode" value="mono" checked onclick="setMode('mono')"> 🔳 Grayscale</label>
                    <label><input type="radio" name="color-mode" value="color" onclick="setMode('color')"> 🎨 Color (YUV422)</label>
                </div>
            </div>

            <div class="control-row" style="margin-top: 15px;">
                <label>Width:</label>
                <span id="width-val-display" class="val-display" style="color: #00ffcc;">80 px</span>
                <button class="adj-btn" onclick="adjustWidth(-1)">-1</button>
                <button class="adj-btn" onclick="adjustWidth(1)">+1</button>
                <button class="adj-btn" onclick="adjustWidth(-4)" style="margin-left: 10px;">-4</button>
                <button class="adj-btn" onclick="adjustWidth(4)">+4</button>
                <button class="adj-btn" onclick="adjustWidth(-10)" style="margin-left: 10px;">-10</button>
                <button class="adj-btn" onclick="adjustWidth(10)">+10</button>
            </div>

            <div class="control-row">
                <label>Height:</label>
                <span id="height-val-display" class="val-display" style="color: #ffcc00;">60 px</span>
                <button class="adj-btn" onclick="adjustHeight(-1)">-1</button>
                <button class="adj-btn" onclick="adjustHeight(1)">+1</button>
                <button class="adj-btn" onclick="adjustHeight(-4)" style="margin-left: 10px;">-4</button>
                <button class="adj-btn" onclick="adjustHeight(4)">+4</button>
                <button class="adj-btn" onclick="adjustHeight(-10)" style="margin-left: 10px;">-10</button>
                <button class="adj-btn" onclick="adjustHeight(10)">+10</button>
            </div>

            <div class="preset-group">
                <strong>🚀 Quick Resolution Set (For Manual Override):</strong><br><br>
                <button class="preset-btn" onclick="setDimensions(80, 60)" style="background: #888;">QQQVGA (80 x 60)</button>
                <button class="preset-btn" onclick="setDimensions(160, 120)">QQVGA (160 x 120)</button>
                <button class="preset-btn" onclick="setDimensions(320, 240)" style="background: #ff5500;">QVGA (320 x 240)</button>
            </div>
        </div>
    </div>

    <div class="status-panel">
        Status: <span id="status">Disconnected</span> &nbsp; <span id="auto-lock-status" class="auto-status"></span><br>
        PC Stash Buffer Size: <span id="byte-counter" class="counter">0</span> bytes<br>
        Current Render Resolution: <span id="resolution-counter" class="highlight">80 x 60</span><br>
        Size Extracted per Frame: <span id="pixel-count-counter" style="color: #ff3366; font-weight: bold; font-size: 20px;">0</span> / <span id="expected-size-counter">4,800</span> bytes 
    </div>

    <div id="canvas-container">
        <canvas id="video-canvas" width="80" height="60"></canvas>
    </div>

<script>
    const connectBtn = document.getElementById('connect-btn');
    const statusDiv = document.getElementById('status');
    const autoLockStatus = document.getElementById('auto-lock-status');
    const byteCounter = document.getElementById('byte-counter');
    const resolutionCounter = document.getElementById('resolution-counter');
    const pixelCountCounter = document.getElementById('pixel-count-counter');
    const expectedSizeCounter = document.getElementById('expected-size-counter');
    const widthValDisplay = document.getElementById('width-val-display');
    const heightValDisplay = document.getElementById('height-val-display');
    const canvas = document.getElementById('video-canvas');
    const ctx = canvas.getContext('2d');

    let port;
    let reader;
    let serialStash = [];
    
    // 8-byte synchronization marker
    const MARKER = [0xFF, 0xAA, 0x55, 0xAA, 0xFF, 0xAA, 0x55, 0xAA];
    
    // Default initial value: QQQVGA Monochrome
    let activeW = 80;
    let activeH = 60;
    let currentMode = 'mono'; // 'mono' or 'color'
    let fixedBufferSize = 80 * 60; 

    // Variables for auto-lock resolution feature
    let isAutoLocked = false;
    let sizeMatchCount = 0;
    let lastDetectedSize = 0;

    // Table for resolution/mode payload sizes
    const sizeTable = [
        { bytes: 4800,   w: 80,  h: 60,  mode: 'mono'  }, // QQQVGA Mono
        { bytes: 9600,   w: 80,  h: 60,  mode: 'color' }, // QQQVGA Color (80*60*2)
        { bytes: 19200,  w: 160, h: 120, mode: 'mono'  }, // QQVGA Mono
        { bytes: 38400,  w: 160, h: 120, mode: 'color' }, // QQVGA Color (160*120*2)
        { bytes: 76800,  w: 320, h: 240, mode: 'mono'  }, // QVGA Mono
        { bytes: 153600, w: 320, h: 240, mode: 'color' }  // QVGA Color (320*240*2)
    ];

    function applyDimensionChange() {
        if (activeW < 1) activeW = 1;
        if (activeH < 1) activeH = 1;
        
        // Multiplier calculation depending on mode (2 bytes per pixel for color)
        const bytesPerPixel = (currentMode === 'color') ? 2 : 1;
        fixedBufferSize = activeW * activeH * bytesPerPixel;

        widthValDisplay.textContent = `${activeW} px`;
        heightValDisplay.textContent = `${activeH} px`;
        resolutionCounter.textContent = `${activeW} x ${activeH} (${currentMode === 'color' ? 'Color' : 'Grayscale'})`;
        expectedSizeCounter.textContent = fixedBufferSize.toLocaleString();

        canvas.width = activeW;
        canvas.height = activeH;
        
        ctx.fillStyle = "#000000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    window.adjustWidth = function(amount) { activeW += amount; applyDimensionChange(); };
    window.adjustHeight = function(amount) { activeH += amount; applyDimensionChange(); };
    window.setDimensions = function(w, h) { activeW = w; activeH = h; applyDimensionChange(); };
    
    window.setMode = function(mode) {
        currentMode = mode;
        const radio = document.querySelector(`input[name="color-mode"][value="${mode}"]`);
        if (radio) radio.checked = true;
        applyDimensionChange();
    };

    // Initialize
    applyDimensionChange();

    connectBtn.addEventListener('click', async () => {
        try {
            port = await navigator.serial.requestPort();
            await port.open({ baudRate: 921600 });

            if (port.writable) {
                const writer = port.writable.getWriter();
                await writer.ready;
                if (port.clearSignals) {
                    await port.clearSignals({ break: false, dtr: false, rts: false });
                }
                writer.releaseLock();
            }

            serialStash = [];
            isAutoLocked = false;
            sizeMatchCount = 0;
            lastDetectedSize = 0;
            autoLockStatus.textContent = "🔍 Auto-detecting resolution...";
            statusDiv.textContent = "Connected";
            connectBtn.disabled = true;
            readLoop();
        } catch (error) {
            statusDiv.textContent = "Connection Error: " + error;
            autoLockStatus.textContent = "";
        }
    });

    function findMarkerIndex(arr) {
        const maxLen = arr.length - MARKER.length;
        for (let i = 0; i <= maxLen; i++) {
            if (arr[i]     === MARKER[0] &&
                arr[i + 1] === MARKER[1] &&
                arr[i + 2] === MARKER[2] &&
                arr[i + 3] === MARKER[3] &&
                arr[i + 4] === MARKER[4] &&
                arr[i + 5] === MARKER[5] &&
                arr[i + 6] === MARKER[6] &&
                arr[i + 7] === MARKER[7]) {
                return i;
            }
        }
        return -1;
    }

    // Auto-detect resolution and mode based on received payload size
    function tryAutoLockDimension(payloadSize) {
        if (isAutoLocked) return;

        if (payloadSize === lastDetectedSize && payloadSize > 0) {
            sizeMatchCount++;
        } else {
            sizeMatchCount = 0;
            lastDetectedSize = payloadSize;
        }

        // Lock-on after matching size for 3 consecutive frames
        if (sizeMatchCount >= 3) {
            const match = sizeTable.find(item => item.bytes === payloadSize);
            if (match) {
                activeW = match.w;
                activeH = match.h;
                currentMode = match.mode;
                setMode(match.mode);
                setDimensions(match.w, match.h);
                isAutoLocked = true;
                autoLockStatus.textContent = `🔒 Auto-Lock Success (${match.w}x${match.h} ${match.mode === 'color' ? 'Color' : 'Mono'})`;
                autoLockStatus.style.color = "#00ffcc";
                autoLockStatus.style.animation = "none";
            } else {
                // For non-standard custom sizes
                autoLockStatus.textContent = `⚠ Unknown Size Detected: ${payloadSize} bytes (Please adjust manually)`;
                autoLockStatus.style.color = "#ffcc00";
            }
        }
    }

    async function readLoop() {
        try {
            while (port.readable) {
                reader = port.readable.getReader();
                
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    if (!value) continue;

                    const len = value.length;
                    for (let i = 0; i < len; i++) {
                        serialStash.push(value[i]);
                    }

                    byteCounter.textContent = serialStash.length.toLocaleString();

                    while (true) {
                        const firstMarkerIdx = findMarkerIndex(serialStash);
                        if (firstMarkerIdx === -1) {
                            if (serialStash.length >= MARKER.length) {
                                serialStash = serialStash.slice(serialStash.length - MARKER.length + 1);
                            }
                            break;
                        }

                        if (firstMarkerIdx > 0) {
                            serialStash = serialStash.slice(firstMarkerIdx);
                        }

                        const nextMarkerIdx = findMarkerIndex(serialStash.slice(MARKER.length));

                        if (nextMarkerIdx !== -1) {
                            const actualPayloadSize = nextMarkerIdx; 
                            const oneFramePayload = new Uint8Array(serialStash.slice(MARKER.length, MARKER.length + actualPayloadSize));
                            serialStash = serialStash.slice(MARKER.length + actualPayloadSize);
                            
                            pixelCountCounter.textContent = oneFramePayload.length.toLocaleString();

                            // Trigger auto-lock detection
                            tryAutoLockDimension(oneFramePayload.length);

                            // Diverge rendering based on selected mode
                            if (currentMode === 'color') {
                                renderImageFrameYUV422(oneFramePayload, activeW, activeH);
                            } else {
                                renderImageFrameRaw(oneFramePayload, activeW, activeH);
                            }
                            continue; 
                        }

                        const REQUIRED_SIZE = MARKER.length + fixedBufferSize;
                        if (serialStash.length >= REQUIRED_SIZE) {
                            const oneFramePayload = new Uint8Array(serialStash.slice(MARKER.length, REQUIRED_SIZE));
                            pixelCountCounter.textContent = oneFramePayload.length.toLocaleString();
                            
                            if (currentMode === 'color') {
                                renderImageFrameYUV422(oneFramePayload, activeW, activeH);
                            } else {
                                renderImageFrameRaw(oneFramePayload, activeW, activeH);
                            }
                        }
                        break; 
                    }
                }
            }
        } catch (error) {
            console.error("Serial Read Error:", error);
            statusDiv.textContent = "Communication Error Occurred";
        } finally {
            if (reader) reader.releaseLock();
        }
    }

    // 🔳 Monochrome rendering engine
    function renderImageFrameRaw(payloadBuffer, width, height) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const imageData = ctx.createImageData(width, height);
        const data = imageData.data;
        const maxCanvasPixels = width * height;

        for (let i = 0; i < maxCanvasPixels; i++) {
            if (i >= payloadBuffer.length) break;
            let gray = payloadBuffer[i];
            data[i * 4 + 0] = gray; 
            data[i * 4 + 1] = gray; 
            data[i * 4 + 2] = gray; 
            data[i * 4 + 3] = 255;  
        }
        ctx.putImageData(imageData, 0, 0);
    }

    // 🎨 Color (YUV422) rendering engine
    function renderImageFrameYUV422(payloadBuffer, width, height) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const imageData = ctx.createImageData(width, height);
        const data = imageData.data;
        const maxBytes = Math.min(payloadBuffer.length, width * height * 2);

        let pixelIdx = 0;

        for (let i = 0; i < maxBytes; i += 4) {
            if (i + 3 >= maxBytes) break;

            const y1 = payloadBuffer[i + 0];
            const u  = payloadBuffer[i + 1];
            const y2 = payloadBuffer[i + 2];
            const v  = payloadBuffer[i + 3];

            const u_diff = u - 128;
            const v_diff = v - 128;

            // Pixel 1 (Y1, U, V)
            let r1 = y1 + 1.402 * v_diff;
            let g1 = y1 - 0.344136 * u_diff - 0.714136 * v_diff;
            let b1 = y1 + 1.772 * u_diff;

            data[pixelIdx * 4 + 0] = r1 > 255 ? 255 : (r1 < 0 ? 0 : r1);
            data[pixelIdx * 4 + 1] = g1 > 255 ? 255 : (g1 < 0 ? 0 : g1);
            data[pixelIdx * 4 + 2] = b1 > 255 ? 255 : (b1 < 0 ? 0 : b1);
            data[pixelIdx * 4 + 3] = 255; 
            pixelIdx++;

            // Pixel 2 (Y2, U, V)
            let r2 = y2 + 1.402 * v_diff;
            let g2 = y2 - 0.344136 * u_diff - 0.714136 * v_diff;
            let b2 = y2 + 1.772 * u_diff;

            data[pixelIdx * 4 + 0] = r2 > 255 ? 255 : (r2 < 0 ? 0 : r2);
            data[pixelIdx * 4 + 1] = g2 > 255 ? 255 : (g2 < 0 ? 0 : g2);
            data[pixelIdx * 4 + 2] = b2 > 255 ? 255 : (b2 < 0 ? 0 : b2);
            data[pixelIdx * 4 + 3] = 255; 
            pixelIdx++;
        }
        ctx.putImageData(imageData, 0, 0);
    }
</script>
</body>
</html>
